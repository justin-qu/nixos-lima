# To see all yaml config options: https://github.com/lima-vm/lima/blob/master/templates/default.yaml

# To build images locally, clone https://github.com/justin-qu/nixos-lima and then run:
# nix build .#packages.aarch64-linux.nixos-image --out-link result-aarch64
# nix build .#packages.x86_64-linux.nixos-image --out-link result-x86_64
# nix build .#packages.aarch64-linux.nixos-determinate-image --out-link result-determinate-aarch64
# nix build .#packages.x86_64-linux.nixos-determinate-image --out-link result-determinate-x86_64
# to build the image.

# To use this configuration to start a VM with a locally-built image. 
# images:
#   - location: "./result-aarch64/nixos.qcow2"
#     arch: aarch64
#   - location: "./result-aarch64/nixos.qcow2"
#     arch: x86_64
#   - location: "./result-determinate-aarch64/nixos.qcow2"
#     arch: aarch64
#   - location: "./result-determinate-aarch64/nixos.qcow2"
#     arch: x86_64

images:
  - location: https://github.com/justin-qu/nixos-lima/releases/download/v1.0.0/nixos-determinate-v1.0.0-aarch64.qcow2
    arch: aarch64
    digest: sha512:a5c81b5680d43ba5c92f21260628dc41709e9de4bcc8b06a234bbaa72f46a46d1a112428bcf3db6b64af2054795918b67f17600e9bc1a0c338eb5e7143d73109

mountInotify: true

mounts:
  - location: '~'
    writable: false
#   - location: ~/shared
#     writable: true

rosetta:
  enabled: true

# Configured for 14-Core M4, 48GB RAM, 2TB Storage
cpus: 12
memory: 40GiB
disk: 1024GiB

portForwards:
  # Tell Lima's port-forwarding to ignore port 68 to prevent interception of host DHCP packets
  # Apparently this is an issue with NixOS that does not occur on other Linux distros
  # See: https://github.com/nixos-lima/nixos-lima/issues/50
  - proto: udp
    guestPort: 68
    guestIP: 0.0.0.0
    ignore: true
    
containerd:
  system: false
  user: false

# user:
#   name: "developer"

# ssh:
#   # A localhost port of the host. Forwarded to port 22 of the guest.
#   # The built-in default is 0 (automatically assigned to a free port).
#   localPort: 60022